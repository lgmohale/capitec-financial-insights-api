repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest-pre-push
        name: Run pytest before push
        entry: docker compose run --rm api pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
