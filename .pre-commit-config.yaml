repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: Ruff lint and fix
        args: [--fix, --exit-non-zero-on-fix]

      - id: ruff-format
        name: Ruff format

  - repo: local
    hooks:
      - id: pytest-pre-push
        name: Run unit and integration tests before push
        entry: bash -c 'docker compose up -d --wait postgres redis minio && docker compose run --rm api alembic upgrade head && docker compose run --rm api pytest tests/unit tests/integration -q'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
