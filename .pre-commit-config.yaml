repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: Ruff lint and fix
        args: [--fix, --exit-non-zero-on-fix]

      - id: ruff-format
        name: Ruff format

  - repo: local
    hooks:
      - id: pytest-pre-push
        name: Run pytest before push
        entry: docker compose run --rm api pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true